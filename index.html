<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Parkour PRO FINAL</title>
<style>
body{margin:0;overflow:hidden;background:#0b0f1a;font-family:Arial;color:white}
canvas{position:fixed;inset:0}/* MENU */ #menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);z-index:10} .menu-box{background:rgba(255,255,255,0.08);padding:30px;border-radius:20px;backdrop-filter:blur(10px);text-align:center} input,button{padding:12px;margin:10px;border:none;border-radius:10px} button{background:linear-gradient(45deg,#00ccff,#00ffcc);cursor:pointer;font-weight:bold}

/* UI */ #coins{position:fixed;top:10px;right:10px;z-index:5}

/* CONTROLES MOVIL */ #controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:5} .ctrl{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:24px} </style>

</head>
<body><div id="menu">
 <div class="menu-box">
  <h1>⚡ Stickman Parkour ⚡</h1>
  <input id="name" placeholder="Tu nombre"><br>
  <button id="play">🎮 Jugar</button>
 </div>
</div><div id="coins">💰 0</div><div id="controls">
 <div class="ctrl" id="left">⬅</div>
 <div class="ctrl" id="jump">⬆</div>
 <div class="ctrl" id="right">➡</div>
</div><canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener("resize",resize);

let playerName="";
let gameStarted=false;
let cameraX=0;
let coins=0;

let player={x:100,y:200,dx:0,dy:0,width:20,height:50,jumping:false,frame:0};
let gravity=0.6;
let keys={};

let platforms=[{x:0,y:300,width:400,height:20}];

play.onclick=()=>{
 playerName=name.value||"Jugador";
 menu.style.display="none";
 gameStarted=true;
}

// CONTROLES MOVIL
left.ontouchstart=()=>keys.ArrowLeft=true;
left.ontouchend=()=>keys.ArrowLeft=false;
right.ontouchstart=()=>keys.ArrowRight=true;
right.ontouchend=()=>keys.ArrowRight=false;
jump.ontouchstart=()=>{if(!player.jumping) player.dy=-12};

window.addEventListener("keydown",e=>{
 if(e.code==="ArrowRight") keys.ArrowRight=true;
 if(e.code==="ArrowLeft") keys.ArrowLeft=true;
 if(e.code==="Space"&&!player.jumping) player.dy=-12;
});
window.addEventListener("keyup",e=>{
 if(e.code==="ArrowRight") keys.ArrowRight=false;
 if(e.code==="ArrowLeft") keys.ArrowLeft=false;
});

function update(){
 if(!gameStarted) return;

 player.frame++;

 if(keys.ArrowRight) player.dx+=0.4;
 if(keys.ArrowLeft) player.dx-=0.4;

 player.dx*=0.85;
 player.x+=player.dx;
 cameraX=player.x-200;

 player.dy+=gravity;
 player.y+=player.dy;

 player.jumping=true;
 for(let p of platforms){
  if(player.x<p.x+p.width&&player.x+player.width>p.x&&player.y+player.height<p.y+10&&player.y+player.height+player.dy>=p.y){
   player.y=p.y-player.height;
   player.dy=0;
   player.jumping=false;
  }
 }

 // monedas
 if(Math.random()<0.01){coins++;document.getElementById("coins").innerText="💰 "+coins}
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // fondo
 let g=ctx.createLinearGradient(0,0,0,canvas.height);
 g.addColorStop(0,"#0f2027");
 g.addColorStop(1,"#203a43");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // plataforma
 ctx.fillStyle="#00ffcc";
 for(let p of platforms){ctx.fillRect(p.x-cameraX,p.y,p.width,p.height)}

 // stickman suave
 let px=player.x-cameraX;
 let speed=Math.abs(player.dx);
 let swing=Math.sin(player.frame*0.2)*(speed>0.2?10:3);
 let idle=Math.sin(player.frame*0.1)*3;

 ctx.strokeStyle="white";
 ctx.lineWidth=3;

 // cabeza
 ctx.beginPath();ctx.arc(px+10,player.y-10+idle,10,0,Math.PI*2);ctx.stroke();

 // cuerpo
 ctx.beginPath();ctx.moveTo(px+10,player.y);ctx.lineTo(px+10,player.y+25);ctx.stroke();

 // brazos
 ctx.beginPath();
 ctx.moveTo(px+10,player.y+10);
 ctx.lineTo(px-10+swing,player.y+20);
 ctx.moveTo(px+10,player.y+10);
 ctx.lineTo(px+30-swing,player.y+20);
 ctx.stroke();

 // piernas
 ctx.beginPath();
 ctx.moveTo(px+10,player.y+25);
 ctx.lineTo(px-10-swing,player.y+50);
 ctx.moveTo(px+10,player.y+25);
 ctx.lineTo(px+30+swing,player.y+50);
 ctx.stroke();

 // nombre
 ctx.fillStyle="white";
 ctx.fillText(playerName,px-20,player.y-20);
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script></body>
</html>
