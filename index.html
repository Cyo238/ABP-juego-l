<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stickman Parkour Mejorado</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; }
    #ui {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(20,20,20,0.95));
      color: white;
      text-align: center;
    }

    #ui h1 {
      font-size: 48px;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-shadow: 0 0 15px red;
    }

    #ui p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    button {
      padding: 14px 26px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff0000, #ff6600);
      color: white;
      box-shadow: 0 0 15px rgba(255,0,0,0.6);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255,100,0,0.9);
    }
    button { padding: 12px 20px; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1>💀 GAME OVER 💀</h1>
  <p>El parkour no fue suficiente...</p>
  <button onclick="restart()">🔁 Reintentar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.6;
let speed = 4;
let cameraX = 0;
let gameOver = false;

let player = {
  x: 100,
  y: 0,
  width: 20,
  height: 50,
  dy: 0,
  jumping: false,
  frame: 0
};

let platforms = [];
let obstacles = [];

function generateWorld(xStart) {
  for (let i = 0; i < 10; i++) {
    let x = xStart + i * 250;
    let y = 350 + Math.sin(i) * 60;

    platforms.push({x, y, width: 180, height: 20});

    // evitar obstáculos cerca del inicio
    if (x > 400 && Math.random() < 0.5) {
      obstacles.push({x: x + 120, y: y - 30, size: 30});
    }
  }
}

// generar mundo inicial
generateWorld(0);

// colocar jugador correctamente sobre la primera plataforma
player.y = platforms[0].y - player.height;

function drawStickman(p) {
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  let swing = Math.sin(p.frame * 0.3) * 10;

  ctx.beginPath();
  ctx.arc(p.x - cameraX + 10, p.y - 10, 10, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y);
  ctx.lineTo(p.x - cameraX + 10, p.y + 25);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX - 5 + swing, p.y + 20);
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX + 25 - swing, p.y + 20);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX - 5 - swing, p.y + 45);
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX + 25 + swing, p.y + 45);
  ctx.stroke();

  ctx.fillStyle = "white";
  ctx.font = "14px Arial";
  ctx.fillText("pinto vrg", p.x - cameraX - 20, p.y - 30);
}

function update() {
  if (gameOver) return;

  player.frame++;
  player.dy += gravity;
  player.y += player.dy;

  player.x += speed;
  cameraX = player.x - 100;

  player.jumping = true;

  for (let plat of platforms) {
    if (
      player.x < plat.x + plat.width &&
      player.x + player.width > plat.x &&
      player.y + player.height < plat.y + 10 &&
      player.y + player.height + player.dy >= plat.y
    ) {
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }
  }

  for (let obs of obstacles) {
    if (
      player.x < obs.x + obs.size &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.size &&
      player.y + player.height > obs.y
    ) {
      endGame();
    }
  }

  if (player.y > canvas.height) {
    endGame();
  }

  if (player.x > platforms[platforms.length - 1].x - 500) {
    generateWorld(platforms.length * 250);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  for (let plat of platforms) {
    ctx.fillRect(plat.x - cameraX, plat.y, plat.width, plat.height);
  }

  ctx.fillStyle = "red";
  for (let obs of obstacles) {
    ctx.fillRect(obs.x - cameraX, obs.y, obs.size, obs.size);
  }

  drawStickman(player);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  document.getElementById("ui").style.display = "flex";
}

function restart() {
  location.reload();
}

window.addEventListener("keydown", e => {
  if (e.code === "Space" && !player.jumping) {
    player.dy = -12;
  }
});

loop();
</script>
</body>
</html>
