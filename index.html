<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Parkour PRO</title>
<style>
body{margin:0;overflow:hidden;background:#0b0f1a;font-family:Arial}
canvas{display:block}

#ui{
 position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
 background:radial-gradient(circle,#1a0000,#000);color:white;text-align:center
}

button{
 padding:14px 28px;border:none;border-radius:25px;
 background:linear-gradient(45deg,#ff0000,#ff8800);
 color:white;font-size:18px;cursor:pointer;
 box-shadow:0 0 15px rgba(255,0,0,0.5)
}

#score{
 position:fixed;top:10px;left:10px;color:white;font-size:18px;opacity:0.8
}
</style>
</head>
<body>

<div id="score">0 m</div>
<canvas id="game"></canvas>

<div id="ui">
 <h1 id="endText">GAME OVER</h1>
 <button onclick="restart()">Reiniciar</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener("resize",resize);

let keys={},gameOver=false,cameraX=0;
let gravity=0.6;

let player={
 x:100,y:0,width:20,height:50,
 dx:0,dy:0,speed:0.5,maxSpeed:7,friction:0.85,
 jumping:false,frame:0
};

let platforms=[],obstacles=[];
let lastX=0;

function generate(){
 for(let i=0;i<6;i++){
  let x=lastX+i*200;
  let y=canvas.height-(150+Math.random()*120);

  platforms.push({x,y,width:150,height:20});

  if(Math.random()<0.5){
   obstacles.push({x:x+80,y:y-30,size:30});
  }
 }
 lastX+=6*200;
}

generate();
player.y=platforms[0].y-player.height;

function drawBackground(){
 let g=ctx.createLinearGradient(0,0,0,canvas.height);
 g.addColorStop(0,"#0f2027");
 g.addColorStop(1,"#203a43");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // estrellas
 ctx.fillStyle="white";
 for(let i=0;i<50;i++){
  let x=(i*200-cameraX*0.2)%canvas.width;
  let y=(i*50)%canvas.height;
  ctx.fillRect(x,y,2,2);
 }
}

function drawPlayer(p){
 let px=p.x-cameraX;
 let speed=Math.abs(p.dx);
 let swing=Math.sin(p.frame*0.3)*(speed>0.5?10:3);

 ctx.strokeStyle="white";
 ctx.lineWidth=2;

 ctx.beginPath();
 ctx.arc(px+10,p.y-10,10,0,Math.PI*2);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(px+10,p.y);
 ctx.lineTo(px+10,p.y+25);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(px+10,p.y+10);
 ctx.lineTo(px-5+swing,p.y+20);
 ctx.moveTo(px+10,p.y+10);
 ctx.lineTo(px+25-swing,p.y+20);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(px+10,p.y+25);
 ctx.lineTo(px-5-swing,p.y+45);
 ctx.moveTo(px+10,p.y+25);
 ctx.lineTo(px+25+swing,p.y+45);
 ctx.stroke();
}

function drawPlatforms(){
 for(let p of platforms){
  let px=p.x-cameraX;

  ctx.fillStyle="rgba(0,0,0,0.4)";
  ctx.fillRect(px+5,p.y+5,p.width,p.height);

  let g=ctx.createLinearGradient(px,p.y,px,p.y+p.height);
  g.addColorStop(0,"#00ffcc");
  g.addColorStop(1,"#006666");

  ctx.fillStyle=g;
  ctx.fillRect(px,p.y,p.width,p.height);
 }
}

function drawObstacles(){
 for(let o of obstacles){
  let px=o.x-cameraX;

  ctx.shadowColor="red";
  ctx.shadowBlur=15;

  ctx.fillStyle="#ff4444";
  ctx.beginPath();
  ctx.moveTo(px,o.y+o.size);
  ctx.lineTo(px+o.size/2,o.y);
  ctx.lineTo(px+o.size,o.y+o.size);
  ctx.fill();

  ctx.shadowBlur=0;
 }
}

function update(){
 if(gameOver)return;

 player.frame++;

 if(keys["ArrowRight"]) player.dx+=player.speed;
 if(keys["ArrowLeft"]) player.dx-=player.speed;

 player.dx=Math.max(-player.maxSpeed,Math.min(player.maxSpeed,player.dx));
 player.dx*=player.friction;

 player.x+=player.dx;
 cameraX=player.x-canvas.width/3;

 player.dy+=gravity;
 player.y+=player.dy;

 player.jumping=true;

 for(let p of platforms){
  if(player.x<p.x+p.width && player.x+player.width>p.x &&
     player.y+player.height<p.y+10 && player.y+player.height+player.dy>=p.y){
   player.y=p.y-player.height;
   player.dy=0;
   player.jumping=false;
  }
 }

 for(let o of obstacles){
  if(player.x<o.x+o.size && player.x+player.width>o.x &&
     player.y<o.y+o.size && player.y+player.height>o.y){
   endGame();
  }
 }

 if(player.y>canvas.height) endGame();

 if(player.x>lastX-500) generate();

 document.getElementById("score").innerText = Math.floor(player.x/10)+" m";
}

function draw(){
 drawBackground();
 drawPlatforms();
 drawObstacles();
 drawPlayer(player);
}

function loop(){update();draw();requestAnimationFrame(loop)}

function endGame(){
 gameOver=true;
 document.getElementById("ui").style.display="flex";
}

function restart(){location.reload()}

window.addEventListener("keydown",e=>{
 if(e.code==="ArrowRight") keys["ArrowRight"]=true;
 if(e.code==="ArrowLeft") keys["ArrowLeft"]=true;
 if(e.code==="Space"&&!player.jumping) player.dy=-12;
});

window.addEventListener("keyup",e=>{
 if(e.code==="ArrowRight") keys["ArrowRight"]=false;
 if(e.code==="ArrowLeft") keys["ArrowLeft"]=false;
});

loop();
</script>
</body>
</html>
