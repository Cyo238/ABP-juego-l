<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stickman Parkour con Final</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; }

    #ui {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column;
      background: radial-gradient(circle at center, #1a0000, #000);
      color: white; text-align: center;
    }

    #ui h1 { font-size: 60px; text-shadow: 0 0 20px red; }

    button {
      padding: 14px 28px; border: none; border-radius: 30px;
      font-size: 18px; cursor: pointer;
      background: linear-gradient(45deg,#ff0000,#ff8800);
      color: white;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1 id="endText">💀 GAME OVER 💀</h1>
  <button onclick="restart()">🔁 Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.6;
let gameOver = false;
let cameraX = 0;
let win = false;

let keys = {};

let player = {
  x: 100,
  y: 0,
  width: 20,
  height: 50,
  dx: 0,
  dy: 0,
  speed: 5,
  jumping: false,
  frame: 0
};

let platforms = [];
let obstacles = [];
let lastGeneratedX = 0;
let finishX = 3000; // FINAL DEL NIVEL

function generateWorld() {
  for (let i = 0; i < 6; i++) {
    let x = lastGeneratedX + i * 180;

    let heights = [350, 320, 300, 280];
    let y = heights[Math.floor(Math.random() * heights.length)];

    platforms.push({x, y, width: 140, height: 20, alpha: 0});

    if (Math.random() < 0.4) {
      obstacles.push({x: x + 70, y: y - 30, size: 30, alpha: 0});
    }
  }
  lastGeneratedX += 6 * 180;
}

// inicio
generateWorld();
player.y = platforms[0].y - player.height;

function update() {
  if (gameOver) return;

  if (keys["ArrowRight"]) player.dx = player.speed;
  else if (keys["ArrowLeft"]) player.dx = -player.speed;
  else player.dx = 0;

  player.x += player.dx;
  cameraX = player.x - 150;

  player.dy += gravity;
  player.y += player.dy;

  player.jumping = true;

  for (let plat of platforms) {
    if (plat.alpha < 1) plat.alpha += 0.05;

    if (
      player.x < plat.x + plat.width &&
      player.x + player.width > plat.x &&
      player.y + player.height < plat.y + 10 &&
      player.y + player.height + player.dy >= plat.y
    ) {
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }
  }

  for (let obs of obstacles) {
    if (obs.alpha < 1) obs.alpha += 0.05;

    if (
      player.x < obs.x + obs.size &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.size &&
      player.y + player.height > obs.y
    ) {
      endGame(false);
    }
  }

  if (player.y > canvas.height) endGame(false);

  // GENERAR MAPA HASTA EL FINAL
  if (player.x > lastGeneratedX - 400 && lastGeneratedX < finishX) {
    generateWorld();
  }

  // LLEGAR AL FINAL
  if (player.x >= finishX) {
    endGame(true);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let plat of platforms) {
    ctx.globalAlpha = plat.alpha;
    ctx.fillStyle = "#0f0";
    ctx.fillRect(plat.x - cameraX, plat.y, plat.width, plat.height);
  }

  for (let obs of obstacles) {
    ctx.globalAlpha = obs.alpha;
    ctx.fillStyle = "red";
    ctx.fillRect(obs.x - cameraX, obs.y, obs.size, obs.size);
  }

  // META VISUAL
  ctx.globalAlpha = 1;
  ctx.fillStyle = "gold";
  ctx.fillRect(finishX - cameraX, 200, 20, 200);

  ctx.fillStyle = "white";
  ctx.fillText("FIN", finishX - cameraX - 10, 190);

  // jugador
  ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame(victory) {
  gameOver = true;
  let text = document.getElementById("endText");

  if (victory) {
    text.innerText = "🏆 GANASTE 🏆";
  } else {
    text.innerText = "💀 GAME OVER 💀";
  }

  document.getElementById("ui").style.display = "flex";
}

function restart() { location.reload(); }

window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (e.code === "Space" && !player.jumping) player.dy = -12;
});

window.addEventListener("keyup", e => {
  keys[e.code] = false;
});

loop();
</script>
</body>
</html>
