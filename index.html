<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Parkour FINAL PRO+</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#0b0f1a;color:white}
canvas{position:fixed;top:0;left:0}
#menu{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);z-index:10}
.menu-box{background:rgba(255,255,255,0.05);padding:30px;border-radius:20px;backdrop-filter:blur(15px);text-align:center}
button{padding:12px 20px;margin:10px;border:none;border-radius:12px;background:linear-gradient(45deg,#00ccff,#00ffcc);cursor:pointer;font-weight:bold}
</style>
</head>
<body><div id="menu">
 <div class="menu-box">
  <h1>⚡ Stickman Parkour ⚡</h1>
  <input id="name" placeholder="Tu nombre"><br>
  <button id="play">🎮 Jugar</button>
 </div>
</div><canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let playerName="";
let gameStarted=false;
let cameraX=0;

let player={x:100,y:200,dx:0,dy:0,width:20,height:50,jumping:false};
let gravity=0.6;
let keys={};

let platforms=[{x:0,y:300,width:400,height:20}];

play.onclick=()=>{
 playerName=name.value||"Jugador";
 document.getElementById("menu").style.display="none";
 gameStarted=true;
}

function update(){
 if(!gameStarted) return;

 if(keys.ArrowRight) player.dx+=0.5;
 if(keys.ArrowLeft) player.dx-=0.5;

 player.dx*=0.85;
 player.x+=player.dx;
 cameraX=player.x-200;

 player.dy+=gravity;
 player.y+=player.dy;

 player.jumping=true;
 for(let p of platforms){
  if(player.x<p.x+p.width&&player.x+player.width>p.x&&player.y+player.height<p.y+10&&player.y+player.height+player.dy>=p.y){
   player.y=p.y-player.height;
   player.dy=0;
   player.jumping=false;
  }
 }
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // fondo
 let g=ctx.createLinearGradient(0,0,0,canvas.height);
 g.addColorStop(0,"#0f2027");
 g.addColorStop(1,"#203a43");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // plataforma
 ctx.fillStyle="#00ffcc";
 for(let p of platforms){
  ctx.fillRect(p.x-cameraX,p.y,p.width,p.height);
 }

 // STICKMAN COMPLETO
 let px = player.x - cameraX;
 let swing = Math.sin(player.x * 0.05) * 10;

 ctx.strokeStyle = "white";
 ctx.lineWidth = 3;

 // cabeza
 ctx.beginPath();
 ctx.arc(px + 10, player.y - 10, 10, 0, Math.PI * 2);
 ctx.stroke();

 // cuerpo
 ctx.beginPath();
 ctx.moveTo(px + 10, player.y);
 ctx.lineTo(px + 10, player.y + 25);
 ctx.stroke();

 // brazo izquierdo
 ctx.beginPath();
 ctx.moveTo(px + 10, player.y + 10);
 ctx.lineTo(px - 10 + swing, player.y + 20);
 ctx.stroke();

 // brazo derecho
 ctx.beginPath();
 ctx.moveTo(px + 10, player.y + 10);
 ctx.lineTo(px + 30 - swing, player.y + 20);
 ctx.stroke();

 // pierna izquierda
 ctx.beginPath();
 ctx.moveTo(px + 10, player.y + 25);
 ctx.lineTo(px - 10 - swing, player.y + 50);
 ctx.stroke();

 // pierna derecha
 ctx.beginPath();
 ctx.moveTo(px + 10, player.y + 25);
 ctx.lineTo(px + 30 + swing, player.y + 50);
 ctx.stroke();

 // nombre
 ctx.fillStyle = "white";
 ctx.font = "14px Arial";
 ctx.fillText(playerName, px - 20, player.y - 20);
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();

window.addEventListener("keydown",e=>{
 if(e.code==="ArrowRight") keys.ArrowRight=true;
 if(e.code==="ArrowLeft") keys.ArrowLeft=true;
 if(e.code==="Space"&&!player.jumping) player.dy=-12;
});
window.addEventListener("keyup",e=>{
 if(e.code==="ArrowRight") keys.ArrowRight=false;
 if(e.code==="ArrowLeft") keys.ArrowLeft=false;
});
</script></body>
</html>
