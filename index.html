<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stickman Parkour Fluido</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; }

    #ui {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column;
      background: radial-gradient(circle at center, #1a0000, #000);
      color: white; text-align: center;
    }

    #ui h1 { font-size: 60px; text-shadow: 0 0 20px red; }

    button {
      padding: 14px 28px; border: none; border-radius: 30px;
      font-size: 18px; cursor: pointer;
      background: linear-gradient(45deg,#ff0000,#ff8800);
      color: white;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1 id="endText">💀 GAME OVER 💀</h1>
  <button onclick="restart()">🔁 Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.6;
let gameOver = false;
let cameraX = 0;
let finishX = 3000;

let keys = {};

let player = {
  x: 100,
  y: 0,
  width: 20,
  height: 50,
  dx: 0,
  dy: 0,
  speed: 0.5, // aceleración
  maxSpeed: 6,
  friction: 0.85,
  jumping: false,
  frame: 0
};

let platforms = [];
let obstacles = [];
let lastGeneratedX = 0;

function generateWorld() {
  for (let i = 0; i < 6; i++) {
    let x = lastGeneratedX + i * 180;
    let heights = [350, 320, 300, 280];
    let y = heights[Math.floor(Math.random() * heights.length)];

    platforms.push({x, y, width: 140, height: 20});

    if (Math.random() < 0.4) {
      obstacles.push({x: x + 70, y: y - 30, size: 30});
    }
  }
  lastGeneratedX += 6 * 180;
}

generateWorld();
player.y = platforms[0].y - player.height;

function drawStickman(p) {
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  let speedFactor = Math.min(Math.abs(p.dx) / p.maxSpeed, 1);
  let swing = Math.sin(p.frame * 0.4) * 15 * speedFactor;

  let px = p.x - cameraX;

  // cabeza
  ctx.beginPath();
  ctx.arc(px + 10, p.y - 10, 10, 0, Math.PI * 2);
  ctx.stroke();

  // cuerpo
  ctx.beginPath();
  ctx.moveTo(px + 10, p.y);
  ctx.lineTo(px + 10, p.y + 25);
  ctx.stroke();

  // brazos
  ctx.beginPath();
  ctx.moveTo(px + 10, p.y + 10);
  ctx.lineTo(px - 5 + swing, p.y + 20);
  ctx.moveTo(px + 10, p.y + 10);
  ctx.lineTo(px + 25 - swing, p.y + 20);
  ctx.stroke();

  // piernas
  ctx.beginPath();
  ctx.moveTo(px + 10, p.y + 25);
  ctx.lineTo(px - 5 - swing, p.y + 45);
  ctx.moveTo(px + 10, p.y + 25);
  ctx.lineTo(px + 25 + swing, p.y + 45);
  ctx.stroke();

  // nombre
  ctx.fillStyle = "white";
  ctx.fillText("pinto vrg", px - 20, p.y - 30);
}

function update() {
  if (gameOver) return;

  player.frame++;

  // aceleración progresiva
  if (keys["ArrowRight"]) {
    player.dx += player.speed;
  } else if (keys["ArrowLeft"]) {
    player.dx -= player.speed;
  }

  // límite de velocidad
  player.dx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.dx));

  // fricción
  player.dx *= player.friction;

  player.x += player.dx;
  cameraX = player.x - 150;

  // gravedad
  player.dy += gravity;
  player.y += player.dy;

  player.jumping = true;

  for (let plat of platforms) {
    if (
      player.x < plat.x + plat.width &&
      player.x + player.width > plat.x &&
      player.y + player.height < plat.y + 10 &&
      player.y + player.height + player.dy >= plat.y
    ) {
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }
  }

  for (let obs of obstacles) {
    if (
      player.x < obs.x + obs.size &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.size &&
      player.y + player.height > obs.y
    ) {
      endGame(false);
    }
  }

  if (player.y > canvas.height) endGame(false);

  if (player.x > lastGeneratedX - 400 && lastGeneratedX < finishX) {
    generateWorld();
  }

  if (player.x >= finishX) {
    endGame(true);
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  for (let plat of platforms) {
    ctx.fillRect(plat.x - cameraX, plat.y, plat.width, plat.height);
  }

  ctx.fillStyle = "red";
  for (let obs of obstacles) {
    ctx.fillRect(obs.x - cameraX, obs.y, obs.size, obs.size);
  }

  // meta
  ctx.fillStyle = "gold";
  ctx.fillRect(finishX - cameraX, 200, 20, 200);
  ctx.fillStyle = "white";
  ctx.fillText("FIN", finishX - cameraX - 10, 190);

  drawStickman(player);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame(victory) {
  gameOver = true;
  let text = document.getElementById("endText");
  text.innerText = victory ? "🏆 GANASTE 🏆" : "💀 GAME OVER 💀";
  document.getElementById("ui").style.display = "flex";
}

function restart() { location.reload(); }

window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (e.code === "Space" && !player.jumping) player.dy = -12;
});

window.addEventListener("keyup", e => {
  keys[e.code] = false;
});

loop();
</script>
</body>
</html>
