<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinto Goldo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENÚ -->
<div id="menu">
  <div class="menu-box">
    <h1>⚡ Stickman Parkour ⚡</h1>
    <input id="name" placeholder="Tu nombre"><br>
    <button id="btnPlay">🎮 Jugar</button>
    <button id="btnShop">🛒 Tienda</button>
  </div>
</div>

<!-- TIENDA -->
<div id="shop">
  <h2>🛒 Tienda</h2>
  <div class="skin">🥷 Assassin <button class="useSkin" data-skin="assassin">Usar</button></div>
  <div class="skin">⚡ Pikachu <button class="useSkin" data-skin="pikachu">Usar</button></div>
  <div class="skin">🔥 Demon <button class="useSkin" data-skin="demon">Usar</button></div>
  <button id="backMenu">⬅ Volver</button>
</div>

<div id="coins">💰 0</div>

<!-- CONTROLES -->
<div id="controls">
  <div class="ctrl" id="left"><</div>
  <div class="ctrl" id="jump">∆</div>
  <div class="ctrl" id="right">></div>
</div>

<canvas id="game"></canvas>

<script src="game.js"></script>
</body>
</html>
