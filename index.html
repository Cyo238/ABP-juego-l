<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Parkour PRO+</title>
<style>
body{margin:0;overflow:hidden;background:#0b0f1a;font-family:Arial;color:white}
canvas{display:block}

/* LOGIN */
#menu{
 position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
 background:#0b0f1a;z-index:10
}
input,select{
 padding:10px;margin:10px;border-radius:10px;border:none
}
button{
 padding:12px 20px;border:none;border-radius:20px;
 background:linear-gradient(45deg,#00ccff,#00ff99);
 color:black;font-weight:bold;cursor:pointer
}

/* PROGRESO */
#progressContainer{
 position:fixed;top:10px;left:50%;transform:translateX(-50%);
 width:70%;height:15px;background:rgba(255,255,255,0.1);
 border-radius:20px;overflow:hidden
}
#progressBar{
 height:100%;width:0%;
 background:linear-gradient(90deg,#00ffcc,#00aaff)
}
#progressText{
 position:fixed;top:30px;left:50%;transform:translateX(-50%);
 font-size:14px;opacity:0.8
}

#ui{
 position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
 background:radial-gradient(circle,#1a0000,#000)
}
</style>
</head>
<body>

<div id="menu">
 <h1>Stickman Parkour</h1>
 <input id="name" placeholder="Tu nombre">
 <select id="skin">
  <option value="white">Blanco</option>
  <option value="cyan">Cyan</option>
  <option value="yellow">Amarillo</option>
  <option value="red">Rojo</option>
 </select>
 <button onclick="startGame()">Jugar</button>
</div>

<div id="progressContainer"><div id="progressBar"></div></div>
<div id="progressText">0%</div>

<canvas id="game"></canvas>

<div id="ui">
 <h1 id="endText">GAME OVER</h1>
 <button onclick="restart()">Reiniciar</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener("resize",resize);

let playerName="";
let skin="white";
let gameStarted=false;

let keys={},gameOver=false,cameraX=0;
let gravity=0.6;
let finishX=5000;

let player={
 x:100,y:0,width:20,height:50,
 dx:0,dy:0,speed:0.5,maxSpeed:7,friction:0.85,
 jumping:false,frame:0
};

let platforms=[],obstacles=[];
let lastX=0;

function startGame(){
 playerName=document.getElementById("name").value || "Jugador";
 skin=document.getElementById("skin").value;
 document.getElementById("menu").style.display="none";
 gameStarted=true;
}

function generate(){
 for(let i=0;i<6;i++){
  let x=lastX+i*200;
  let y=canvas.height-(150+Math.random()*120);
  platforms.push({x,y,width:150,height:20});
  if(Math.random()<0.5){
   obstacles.push({x:x+80,y:y-30,size:30});
  }
 }
 lastX+=6*200;
}

generate();
player.y=platforms[0].y-player.height;

function updateProgress(){
 let progress=Math.min(player.x/finishX,1);
 let percent=Math.floor(progress*100);
 document.getElementById("progressBar").style.width=percent+"%";
 document.getElementById("progressText").innerText=percent+"%";
}

function drawPlayer(p){
 let px=p.x-cameraX;
 let swing=Math.sin(p.frame*0.3)*10;

 ctx.strokeStyle=skin;
 ctx.lineWidth=2;

 ctx.beginPath();ctx.arc(px+10,p.y-10,10,0,Math.PI*2);ctx.stroke();
 ctx.beginPath();ctx.moveTo(px+10,p.y);ctx.lineTo(px+10,p.y+25);ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(px+10,p.y+10);
 ctx.lineTo(px-5+swing,p.y+20);
 ctx.moveTo(px+10,p.y+10);
 ctx.lineTo(px+25-swing,p.y+20);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(px+10,p.y+25);
 ctx.lineTo(px-5-swing,p.y+45);
 ctx.moveTo(px+10,p.y+25);
 ctx.lineTo(px+25+swing,p.y+45);
 ctx.stroke();

 ctx.fillStyle="white";
 ctx.fillText(playerName,px-20,p.y-30);
}

function update(){
 if(!gameStarted || gameOver)return;

 player.frame++;

 if(keys["ArrowRight"]) player.dx+=player.speed;
 if(keys["ArrowLeft"]) player.dx-=player.speed;

 player.dx=Math.max(-player.maxSpeed,Math.min(player.maxSpeed,player.dx));
 player.dx*=player.friction;

 player.x+=player.dx;
 cameraX=player.x-canvas.width/3;

 player.dy+=gravity;
 player.y+=player.dy;

 player.jumping=true;

 for(let p of platforms){
  if(player.x<p.x+p.width && player.x+player.width>p.x &&
     player.y+player.height<p.y+10 && player.y+player.height+player.dy>=p.y){
   player.y=p.y-player.height;
   player.dy=0;
   player.jumping=false;
  }
 }

 for(let o of obstacles){
  if(player.x<o.x+o.size && player.x+player.width>o.x &&
     player.y<o.y+o.size && player.y+player.height>o.y){
   endGame();
  }
 }

 if(player.y>canvas.height) endGame();

 if(player.x>lastX-500) generate();

 updateProgress();
}

function draw(){
 ctx.fillStyle="#0f2027";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 for(let p of platforms){
  ctx.fillStyle="#00ff99";
  ctx.fillRect(p.x-cameraX,p.y,p.width,p.height);
 }

 for(let o of obstacles){
  ctx.fillStyle="red";
  ctx.fillRect(o.x-cameraX,o.y,o.size,o.size);
 }

 drawPlayer(player);
}

function loop(){update();draw();requestAnimationFrame(loop)}

function endGame(){
 gameOver=true;
 document.getElementById("ui").style.display="flex";
}

function restart(){location.reload()}

window.addEventListener("keydown",e=>{
 if(e.code==="ArrowRight") keys["ArrowRight"]=true;
 if(e.code==="ArrowLeft") keys["ArrowLeft"]=true;
 if(e.code==="Space"&&!player.jumping) player.dy=-12;
});
window.addEventListener("keyup",e=>{
 if(e.code==="ArrowRight") keys["ArrowRight"]=false;
 if(e.code==="ArrowLeft") keys["ArrowLeft"]=false;
});

loop();
</script>
</body>
</html>
