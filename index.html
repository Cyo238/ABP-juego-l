<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stickman Parkour Infinito</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; }
    #ui { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; background: rgba(0,0,0,0.8); color: white; }
    button { padding:12px 20px; border:none; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1>💀 GAME OVER 💀</h1>
  <button onclick="restart()">Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.6;
let gameOver = false;
let cameraX = 0;

let keys = {};

let player = {
  x: 100,
  y: 0,
  width: 20,
  height: 50,
  dx: 0,
  dy: 0,
  speed: 5,
  jumping: false,
  grabbing: false,
  frame: 0
};

let platforms = [];
let obstacles = [];
let lastGeneratedX = 0;

function generateWorld() {
  for (let i = 0; i < 6; i++) {
    let x = lastGeneratedX + i * 180;

    let heights = [350, 320, 300, 280];
    let y = heights[Math.floor(Math.random() * heights.length)];

    platforms.push({x, y, width: 140, height: 20});

    if (Math.random() < 0.4) {
      obstacles.push({x: x + 70, y: y - 30, size: 30});
    }
  }
  lastGeneratedX += 6 * 180;
}

// inicio
generateWorld();
player.y = platforms[0].y - player.height;

function drawStickman(p) {
  ctx.strokeStyle = p.grabbing ? "yellow" : "white";
  ctx.lineWidth = 2;

  let swing = Math.sin(p.frame * 0.3) * 10;

  ctx.beginPath();
  ctx.arc(p.x - cameraX + 10, p.y - 10, 10, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y);
  ctx.lineTo(p.x - cameraX + 10, p.y + 25);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX - 5 + swing, p.y + 20);
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX + 25 - swing, p.y + 20);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX - 5 - swing, p.y + 45);
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX + 25 + swing, p.y + 45);
  ctx.stroke();

  ctx.fillStyle = "white";
  ctx.fillText("pinto vrg", p.x - cameraX - 20, p.y - 30);
}

function update() {
  if (gameOver) return;

  player.frame++;

  // movimiento
  if (keys["ArrowRight"]) player.dx = player.speed;
  else if (keys["ArrowLeft"]) player.dx = -player.speed;
  else player.dx = 0;

  player.x += player.dx;

  // cámara sigue al jugador
  cameraX = player.x - 150;

  // gravedad
  player.dy += gravity;
  player.y += player.dy;

  player.jumping = true;
  player.grabbing = false;

  for (let plat of platforms) {
    if (
      player.x < plat.x + plat.width &&
      player.x + player.width > plat.x &&
      player.y + player.height < plat.y + 10 &&
      player.y + player.height + player.dy >= plat.y
    ) {
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }

    if (
      player.x + player.width > plat.x &&
      player.x < plat.x &&
      player.y + player.height > plat.y &&
      player.y < plat.y
    ) {
      player.grabbing = true;
      player.dy = 0;
      player.y = plat.y - player.height;
    }
  }

  for (let obs of obstacles) {
    if (
      player.x < obs.x + obs.size &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.size &&
      player.y + player.height > obs.y
    ) {
      endGame();
    }
  }

  if (player.y > canvas.height) endGame();

  // generar mundo infinito
  if (player.x > lastGeneratedX - 400) {
    generateWorld();
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0f0";
  for (let plat of platforms) {
    ctx.fillRect(plat.x - cameraX, plat.y, plat.width, plat.height);
  }

  ctx.fillStyle = "red";
  for (let obs of obstacles) {
    ctx.fillRect(obs.x - cameraX, obs.y, obs.size, obs.size);
  }

  drawStickman(player);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  document.getElementById("ui").style.display = "flex";
}

function restart() { location.reload(); }

window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (e.code === "Space" && !player.jumping) player.dy = -12;
});

window.addEventListener("keyup", e => {
  keys[e.code] = false;
});

loop();
</script>
</body>
</html>
