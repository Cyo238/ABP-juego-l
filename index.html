<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stickman Parkour Mobile</title>
  <style>
    body { margin:0; overflow:hidden; font-family:Arial; background:#0b0f1a; }
    canvas { display:block; }/* CONTROLES MÓVIL */
#controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-around;
  pointer-events: none;
}

.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  user-select: none;
}

#progressContainer {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  width: 80%; height: 15px; background: rgba(255,255,255,0.1);
  border-radius: 20px; overflow: hidden;
}
#progressBar { height:100%; width:0%; background: linear-gradient(90deg,#00ffcc,#00aaff); }

#ui {
  position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column;
  background: radial-gradient(circle at center, #1a0000, #000);
  color: white; text-align: center;
}

button {
  padding:14px 28px; border:none; border-radius:30px;
  font-size:18px; cursor:pointer;
  background:linear-gradient(45deg,#ff0000,#ff8800);
  color:white;
}

  </style>
</head>
<body><div id="progressContainer"><div id="progressBar"></div></div><canvas id="game"></canvas>

<div id="controls">
  <div class="btn" id="left">⬅️</div>
  <div class="btn" id="jump">⬆️</div>
  <div class="btn" id="right">➡️</div>
</div><div id="ui">
  <h1 id="endText">💀 GAME OVER 💀</h1>
  <button onclick="restart()">🔁 Reiniciar</button>
</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let gravity = 0.6;
let gameOver = false;
let cameraX = 0;
let finishX = 3000;

let keys = {};

let player = {
  x: 100, y: 0, width: 20, height: 50,
  dx: 0, dy: 0, speed: 0.5, maxSpeed: 6, friction: 0.85,
  jumping: false, frame: 0
};

let platforms = [];
let obstacles = [];
let lastGeneratedX = 0;

function generateWorld() {
  for (let i = 0; i < 6; i++) {
    let x = lastGeneratedX + i * 180;
    let heights = [canvas.height-150, canvas.height-180, canvas.height-200];
    let y = heights[Math.floor(Math.random()*heights.length)];

    platforms.push({x, y, width: 140, height: 20});

    if (Math.random() < 0.4) {
      obstacles.push({x: x + 70, y: y - 30, size: 30});
    }
  }
  lastGeneratedX += 6 * 180;
}

generateWorld();
player.y = platforms[0].y - player.height;

function updateProgress(){
  let progress = Math.min(player.x/finishX,1);
  document.getElementById("progressBar").style.width = (progress*100)+"%";
}

function update(){
  if(gameOver) return;

  if(keys["right"]) player.dx += player.speed;
  if(keys["left"]) player.dx -= player.speed;

  player.dx = Math.max(-player.maxSpeed, Math.min(player.maxSpeed, player.dx));
  player.dx *= player.friction;

  player.x += player.dx;
  cameraX = player.x - canvas.width/3;

  player.dy += gravity;
  player.y += player.dy;

  player.jumping = true;

  for(let plat of platforms){
    if(player.x < plat.x+plat.width && player.x+player.width > plat.x &&
       player.y+player.height < plat.y+10 && player.y+player.height+player.dy >= plat.y){
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }
  }

  for(let obs of obstacles){
    if(player.x < obs.x+obs.size && player.x+player.width > obs.x &&
       player.y < obs.y+obs.size && player.y+player.height > obs.y){
      endGame(false);
    }
  }

  if(player.y > canvas.height) endGame(false);

  if(player.x > lastGeneratedX - 400 && lastGeneratedX < finishX) generateWorld();
  if(player.x >= finishX) endGame(true);

  updateProgress();
}

function draw(){
  ctx.fillStyle = "#0f2027";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let plat of platforms){
    ctx.fillStyle = "#00ff99";
    ctx.fillRect(plat.x-cameraX, plat.y, plat.width, plat.height);
  }

  for(let obs of obstacles){
    ctx.fillStyle = "red";
    ctx.fillRect(obs.x-cameraX, obs.y, obs.size, obs.size);
  }

  ctx.fillStyle = "gold";
  ctx.fillRect(finishX-cameraX, canvas.height-250, 20, 200);

  ctx.fillStyle="white";
  ctx.fillRect(player.x-cameraX, player.y, player.width, player.height);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function endGame(victory){
  gameOver=true;
  document.getElementById("endText").innerText = victory?"🏆 GANASTE 🏆":"💀 GAME OVER 💀";
  document.getElementById("ui").style.display="flex";
}

function restart(){ location.reload(); }

// teclado
window.addEventListener("keydown",e=>{
  if(e.code==="ArrowRight") keys["right"]=true;
  if(e.code==="ArrowLeft") keys["left"]=true;
  if(e.code==="Space"&&!player.jumping) player.dy=-12;
});
window.addEventListener("keyup",e=>{
  if(e.code==="ArrowRight") keys["right"]=false;
  if(e.code==="ArrowLeft") keys["left"]=false;
});

// móvil
function bindBtn(id, key){
  let btn = document.getElementById(id);
  btn.addEventListener("touchstart",()=> keys[key]=true);
  btn.addEventListener("touchend",()=> keys[key]=false);
}

bindBtn("left","left");
bindBtn("right","right");

document.getElementById("jump").addEventListener("touchstart",()=>{
  if(!player.jumping) player.dy=-12;
});

loop();
</script></body>
</html>
