<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stickman Parkour Infinito</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; }

    #ui {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: radial-gradient(circle at center, #1a0000, #000);
      color: white;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    #ui h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px red;
    }

    #ui p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      background: linear-gradient(45deg,#ff0000,#ff8800);
      color: white;
      box-shadow: 0 0 20px rgba(255,0,0,0.6);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255,100,0,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1>💀 GAME OVER 💀</h1>
  <p>Intenta superar tu récord...</p>
  <button onclick="restart()">🔁 Reintentar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.6;
let gameOver = false;
let cameraX = 0;

let keys = {};

let player = {
  x: 100,
  y: 0,
  width: 20,
  height: 50,
  dx: 0,
  dy: 0,
  speed: 5,
  jumping: false,
  grabbing: false,
  frame: 0
};

let platforms = [];
let obstacles = [];
let lastGeneratedX = 0;

function generateWorld() {
  for (let i = 0; i < 6; i++) {
    let x = lastGeneratedX + i * 180;

    let heights = [350, 320, 300, 280];
    let y = heights[Math.floor(Math.random() * heights.length)];

    platforms.push({x, y, width: 140, height: 20, alpha: 0});

    if (Math.random() < 0.4) {
      obstacles.push({x: x + 70, y: y - 30, size: 30, alpha: 0});
    }
  }
  lastGeneratedX += 6 * 180;
}

// inicio
generateWorld();
player.y = platforms[0].y - player.height;

function drawStickman(p) {
  ctx.strokeStyle = p.grabbing ? "yellow" : "white";
  ctx.lineWidth = 2;

  let swing = Math.sin(p.frame * 0.3) * 10;

  ctx.beginPath();
  ctx.arc(p.x - cameraX + 10, p.y - 10, 10, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y);
  ctx.lineTo(p.x - cameraX + 10, p.y + 25);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX - 5 + swing, p.y + 20);
  ctx.moveTo(p.x - cameraX + 10, p.y + 10);
  ctx.lineTo(p.x - cameraX + 25 - swing, p.y + 20);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX - 5 - swing, p.y + 45);
  ctx.moveTo(p.x - cameraX + 10, p.y + 25);
  ctx.lineTo(p.x - cameraX + 25 + swing, p.y + 45);
  ctx.stroke();

  ctx.fillStyle = "white";
  ctx.fillText("pinto vrg", p.x - cameraX - 20, p.y - 30);
}

function update() {
  if (gameOver) return;

  player.frame++;

  if (keys["ArrowRight"]) player.dx = player.speed;
  else if (keys["ArrowLeft"]) player.dx = -player.speed;
  else player.dx = 0;

  player.x += player.dx;
  cameraX = player.x - 150;

  player.dy += gravity;
  player.y += player.dy;

  player.jumping = true;
  player.grabbing = false;

  for (let plat of platforms) {
    // fade-in animación
    if (plat.alpha < 1) plat.alpha += 0.05;

    if (
      player.x < plat.x + plat.width &&
      player.x + player.width > plat.x &&
      player.y + player.height < plat.y + 10 &&
      player.y + player.height + player.dy >= plat.y
    ) {
      player.y = plat.y - player.height;
      player.dy = 0;
      player.jumping = false;
    }

    if (
      player.x + player.width > plat.x &&
      player.x < plat.x &&
      player.y + player.height > plat.y &&
      player.y < plat.y
    ) {
      player.grabbing = true;
      player.dy = 0;
      player.y = plat.y - player.height;
    }
  }

  for (let obs of obstacles) {
    if (obs.alpha < 1) obs.alpha += 0.05;

    if (
      player.x < obs.x + obs.size &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.size &&
      player.y + player.height > obs.y
    ) {
      endGame();
    }
  }

  if (player.y > canvas.height) endGame();

  if (player.x > lastGeneratedX - 400) {
    generateWorld();
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let plat of platforms) {
    ctx.globalAlpha = plat.alpha;
    ctx.fillStyle = "#0f0";
    ctx.fillRect(plat.x - cameraX, plat.y, plat.width, plat.height);
  }

  for (let obs of obstacles) {
    ctx.globalAlpha = obs.alpha;
    ctx.fillStyle = "red";
    ctx.fillRect(obs.x - cameraX, obs.y, obs.size, obs.size);
  }

  ctx.globalAlpha = 1;

  drawStickman(player);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  document.getElementById("ui").style.display = "flex";
}

function restart() { location.reload(); }

window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (e.code === "Space" && !player.jumping) player.dy = -12;
});

window.addEventListener("keyup", e => {
  keys[e.code] = false;
});

loop();
</script>
</body>
</html>
