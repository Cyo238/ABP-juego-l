<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Parkour FIX FINAL</title>
<style>
body{margin:0;overflow:hidden;background:#0b0f1a;font-family:Arial;color:white}

canvas{position:fixed;top:0;left:0;z-index:0}

#menu, #shop{
 position:fixed;inset:0;
 display:flex;flex-direction:column;align-items:center;justify-content:center;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 z-index:10;
}
#shop{display:none}

.card{
 background:rgba(255,255,255,0.05);
 padding:20px;border-radius:20px;
 backdrop-filter:blur(10px);
}

button{
 padding:12px 20px;margin:10px;border:none;border-radius:10px;
 background:#00ffaa;cursor:pointer;font-weight:bold;
}

#ui{
 position:fixed;inset:0;display:none;
 align-items:center;justify-content:center;flex-direction:column;
 background:#000;z-index:20;
}
</style>
</head>
<body>

<div id="menu">
 <div class="card">
  <h1>Stickman Parkour</h1>
  <input id="name" placeholder="Tu nombre">
  <br>
  <button id="btnShop">🛒 Tienda</button>
  <button id="btnPlay">🎮 Jugar</button>
 </div>
</div>

<div id="shop">
 <h2>Tienda</h2>
 <button id="btnBack">⬅ Volver</button>
</div>

<canvas id="game"></canvas>

<div id="ui">
 <h1 id="endText"></h1>
 <button onclick="location.reload()">Reiniciar</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let gameStarted=false;
let gameOver=false;

let player={x:100,y:200,dx:0,dy:0};
let gravity=0.6;

// BOTONES (FIX REAL)
document.getElementById("btnPlay").addEventListener("click",()=>{
 document.getElementById("menu").style.display="none";
 gameStarted=true;
 resetGame();
});

document.getElementById("btnShop").addEventListener("click",()=>{
 document.getElementById("menu").style.display="none";
 document.getElementById("shop").style.display="flex";
});

document.getElementById("btnBack").addEventListener("click",()=>{
 document.getElementById("shop").style.display="none";
 document.getElementById("menu").style.display="flex";
});

function resetGame(){
 gameOver=false;
 player.x=100;
 player.y=200;
 player.dx=0;
 player.dy=0;
}

function update(){
 if(!gameStarted||gameOver)return;

 player.dy+=gravity;
 player.y+=player.dy;

 if(player.y>canvas.height){
  gameOver=true;
  document.getElementById("ui").style.display="flex";
  document.getElementById("endText").innerText="PERDISTE";
 }
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="white";
 ctx.fillRect(player.x,player.y,20,50);
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
